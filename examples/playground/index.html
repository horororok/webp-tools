<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gif2webp playground</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
      .row { display: flex; gap: 2rem; margin-top: 1rem; flex-wrap: wrap; }
      .col { flex: 1; min-width: 240px; }
      img { max-width: 100%; border: 1px solid #ddd; border-radius: 4px; }
      pre { background: #f6f6f6; padding: 0.75rem; border-radius: 4px; overflow: auto; }
      .ok { color: #137333; }
      .err { color: #c5221f; }
    </style>
  </head>
  <body>
    <h1>@btheegg-kimth/gif2webp playground</h1>
    <p>애니메이션 GIF를 선택하면 WebP로 변환해 양쪽에 미리보기합니다. 이 페이지가
       에러 없이 결과를 띄우면 일반 Vite/브라우저 환경에서 동작한다는 뜻입니다.</p>

    <input type="file" id="file" accept="image/gif" />
    <button id="sample">내장 샘플 GIF로 테스트</button>

    <div id="status"></div>

    <div class="row">
      <div class="col">
        <h3>입력 (GIF)</h3>
        <img id="in" alt="입력 미리보기" />
        <pre id="inInfo"></pre>
      </div>
      <div class="col">
        <h3>출력 (WebP)</h3>
        <img id="out" alt="출력 미리보기" />
        <pre id="outInfo"></pre>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
